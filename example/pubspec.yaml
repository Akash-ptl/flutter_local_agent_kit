name: flutter_local_agent_kit_example
description: Demonstrates how to use the flutter_local_agent_kit package.
publish_to: 'none'

environment:
  sdk: ^3.3.0
  flutter: ">=3.19.0"

dependencies:
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  flutter_local_agent_kit:
    path: ../
  mcp_dart: ^2.1.0

dependency_overrides:
  flutter_rust_bridge: 2.11.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/ai/
    - assets/ai/tokenizer.json
    - assets/ai/embeddings.onnx

