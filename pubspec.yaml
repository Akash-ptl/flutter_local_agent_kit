name: flutter_local_agent_kit
description: Offline-first AI framework for Flutter. Resident LLM inference, local RAG, and autonomous agents with a Material 3 Chat UI.
version: 1.0.2
homepage: https://github.com/akashptl/flutter_local_agent_kit
repository: https://github.com/akashptl/flutter_local_agent_kit
issue_tracker: https://github.com/akashptl/flutter_local_agent_kit/issues


environment:
  sdk: ^3.3.0
  flutter: ">=3.19.0"

dependencies:
  dio: ^5.7.0
  flutter:
    sdk: flutter
  flutter_markdown_plus: ^1.0.7
  llamadart: ^0.6.10
  markdown: ^7.3.1
  math_expressions: ^3.1.0
  mobile_rag_engine: ^0.17.0
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.3

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
